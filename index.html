<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Star Catcher</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:#000011;color:#fff;overflow:hidden;height:100vh;height:100dvh;touch-action:none;user-select:none}
.s{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:#000011}
.s.active{display:flex}
#start{background:#000011}
h1{font-size:clamp(2rem,8vw,3.5rem);font-weight:900;color:#ffee00;text-shadow:0 0 30px #ffee00;margin-bottom:10px}
.sub{color:#446;margin-bottom:30px;font-size:1rem}
.btn{background:#ffee00;color:#000;border:none;padding:18px 55px;font-size:1.2rem;font-weight:700;border-radius:50px;text-transform:uppercase}
.high{position:absolute;top:20px;right:20px;background:#111122;padding:12px 20px;border-radius:15px;font-size:0.9rem}
.high span{color:#ffee00;font-weight:700}
#gc{width:100%;height:100%;background:#000011;display:block}
.h{position:fixed;top:12px;left:12px;right:12px;display:flex;justify-content:space-between;pointer-events:none;z-index:10}
.b{background:#111122;padding:10px 20px;border-radius:18px}
.l{font-size:0.55rem;color:#446;text-transform:uppercase}
.v{font-size:1.4rem;font-weight:900;color:#ffee00}
#over{background:#000011}
.tk{font-size:2.5rem;color:#ffee00;margin-bottom:10px}
.fs{font-size:3rem;font-weight:900;color:#fff}
.fl{color:#446;margin-bottom:25px}
.st{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:100%;max-width:220px;margin-bottom:25px}
.sc{background:#111122;padding:12px;border-radius:12px;text-align:center}
.sv{font-size:1.2rem;font-weight:700;color:#ffee00}
.sl{font-size:0.55rem;color:#446;text-transform:uppercase;margin-top:4px}
.nh{color:#ff4444;font-weight:700;margin-bottom:15px;display:none}
.tut{position:absolute;bottom:50px;color:#446;font-size:0.85rem;text-align:center;padding:0 20px}
</style>
</head>
<body>
<div id="start" class="s active">
<div class="high">HIGH: <span id="hscore">0</span></div>
<h1>⭐ STARS ⭐</h1>
<div class="sub">TRYK FOR AT FANGE</div>
<button class="btn" id="sb">START</button>
<div class="tut">Tryk på skærmen hvor du vil hen</div>
</div>
<div id="game" class="s">
<canvas id="gc"></canvas>
<div class="h">
<div class="b"><div class="l">SCORE</div><div class="v" id="sc">0</div></div>
<div class="b"><div class="l">STJERNER</div><div class="v" id="sz">0</div></div>
</div>
</div>
<div id="over" class="s">
<div class="tk">SLUT!</div>
<div class="nh" id="nhs">NY HIGH!</div>
<div class="fs" id="fs">0</div>
<div class="fl">POINT</div>
<div class="st">
<div class="sc"><div class="sv" id="len">0</div><div class="sl">Stjerner</div></div>
</div>
<button class="btn" id="rb">PRØV IGEN</button>
</div>
<script>
// Star-lyde
const ctx=new(window.AudioContext||window.webkitAudioContext)();
function play(type){
if(ctx.state=='suspended')ctx.resume();
if(type==='catch'){
for(var i=0;i<3;i++){
setTimeout(function(){
var osc=ctx.createOscillator(),gain=ctx.createGain();
osc.type='sine';
var f=800+Math.random()*600;
osc.connect(gain);gain.connect(ctx.destination);
osc.frequency.setValueAtTime(f,ctx.currentTime);
osc.frequency.exponentialRampToValueAtTime(f*1.3,ctx.currentTime+0.1);
gain.gain.setValueAtTime(0.12,ctx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.15);
osc.start();osc.stop(ctx.currentTime+0.15);
},i*40);
}
}
if(type==='die'){
for(var i=0;i<8;i++){
setTimeout(function(){
var osc=ctx.createOscillator(),gain=ctx.createGain();
osc.type='sawtooth';
osc.connect(gain);gain.connect(ctx.destination);
osc.frequency.setValueAtTime(300-30*i,ctx.currentTime);
gain.gain.setValueAtTime(0.1,ctx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.15);
osc.start();osc.stop(ctx.currentTime+0.15);
},i*50);
}
}
if(type==='start'){
var osc=ctx.createOscillator(),gain=ctx.createGain();
osc.type='sine';osc.connect(gain);gain.connect(ctx.destination);
osc.frequency.setValueAtTime(400,ctx.currentTime);
osc.frequency.exponentialRampToValueAtTime(1000,ctx.currentTime+0.3);
gain.gain.setValueAtTime(0.1,ctx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.3);
osc.start();osc.stop(ctx.currentTime+0.3);
}
}
var hs=localStorage.getItem('starHS')||'0';
document.getElementById('hscore').innerText=hs;
var c=document.getElementById('gc');
var x=c.getContext('2d');
var sz=40;
function rz(){
c.width=window.innerWidth;c.height=window.innerHeight;
sz=Math.floor(Math.min(c.width,c.height)/10);
if(sz<30)sz=30;if(sz>60)sz=60;
}
window.onresize=rz;rz();
var sc=0,pl=false;
var stars=[];
var player={x:0,y:0};
var gid,tx=0,ty=0,moving=false;
function st(){
play('start');
sc=0;pl=true;stars=[];
var cx=Math.floor(c.width/sz/2),cy=Math.floor(c.height/sz/2);
player={x:cx,y:cy};tx=cx;ty=cy;moving=false;
for(var i=0;i<5;i++)spawnStar();
document.getElementById('start').classList.remove('active');
document.getElementById('over').classList.remove('active');
document.getElementById('game').classList.add('active');
lp();
}
function spawnStar(){
var mx=Math.floor(c.width/sz),my=Math.floor(c.height/sz),sx,sy,ok;
for(var t=0;t<50;t++){
sx=Math.floor(Math.random()*(mx-2))+1;
sy=Math.floor(Math.random()*(my-4))+2;
ok=true;
if(Math.abs(sx-player.x)<2&&Math.abs(sy-player.y)<2)ok=false;
for(var s of stars){if(s.x==sx&&s.y==sy)ok=false;}
if(ok)break;
}
if(ok)stars.push({x:sx,y:sy,t:Math.random()*Math.PI*2});
}
function lp(){
if(!pl)return;
x.fillStyle='#000011';x.fillRect(0,0,c.width,c.height);
// Baggrunds-stjerner
x.fillStyle='#223';
for(var i=0;i<50;i++){
var bx=(i*137)%c.width,by=(i*251)%c.height;
x.beginPath();x.arc(bx,by,1,0,6.28);x.fill();
}
// Grid
x.strokeStyle='#111122';
for(var i=0;i<c.width;i+=sz){x.beginPath();x.moveTo(i,0);x.lineTo(i,c.height);x.stroke()}
for(var i=0;i<c.height;i+=sz){x.beginPath();x.moveTo(0,i);x.lineTo(c.width,i);x.stroke()}
// Move player towards target
if(moving&&(player.x!==tx||player.y!==ty)){
if(player.x<tx)player.x++;
else if(player.x>tx)player.x--;
if(player.y<ty)player.y++;
else if(player.y>ty)player.y--;
moving=(player.x!==tx||player.y!==ty);
}
// Draw stars
for(var s of stars){
s.t+=0.05;
var glow=0.5+Math.sin(s.t)*0.3;
x.fillStyle='#ffee00';
x.shadowColor='#ffee00';
x.shadowBlur=20*glow;
x.beginPath();
for(var i=0;i<5;i++){
var ang=(i*4*Math.PI/5)-Math.PI/2;
var r=sz*0.35*(i%2===0?1:0.5);
var px=s.x*sz+sz/2+Math.cos(ang+s.t)*r;
var py=s.y*sz+sz/2+Math.sin(ang+s.t)*r;
if(i===0)x.moveTo(px,py);else x.lineTo(px,py);
}
x.closePath();x.fill();
}
x.shadowBlur=0;
// Draw player
x.fillStyle='#ff44ff';
x.shadowColor='#ff44ff';
x.shadowBlur=15;
x.beginPath();
x.arc(player.x*sz+sz/2,player.y*sz+sz/2,sz*0.4,0,6.28);
x.fill();
x.shadowBlur=0;
// Catch
for(var i=stars.length-1;i>=0;i--){
if(stars[i].x===player.x&&stars[i].y===player.y){
sc+=10;
play('catch');
stars.splice(i,1);
spawnStar();
}
}
document.getElementById('sc').innerText=sc;
document.getElementById('sz').innerText=Math.floor(sc/10);
document.getElementById('len').innerText=Math.floor(sc/10);
gid=setTimeout(lp,100);
}
function nd(){pl=false;clearTimeout(gid);play('die');
var h=parseInt(localStorage.getItem('starHS')||'0');
var nh=sc>h;if(nh)localStorage.setItem('starHS',sc);
document.getElementById('game').classList.remove('active');
document.getElementById('over').classList.add('active');
document.getElementById('fs').innerText=sc;
document.getElementById('nhs').style.display=nh?'block':'none';
}
document.getElementById('gc').ontouchstart=function(e){
e.preventDefault();
if(!pl)return;
var ex=e.touches[0].clientX,ey=e.touches[0].clientY;
var mx=Math.floor(c.width/sz),my=Math.floor(c.height/sz);
tx=Math.floor(ex/sz);
ty=Math.floor(ey/sz);
if(tx<0)tx=0;if(tx>=mx)tx=mx-1;
if(ty<0)ty=0;if(ty>=my)ty=my-1;
moving=true;
};
document.getElementById('gc').onclick=function(e){
if(!pl)return;
var ex=e.clientX,ey=e.clientY;
var mx=Math.floor(c.width/sz),my=Math.floor(c.height/sz);
tx=Math.floor(ex/sz);
ty=Math.floor(ey/sz);
if(tx<0)tx=0;if(tx>=mx)tx=mx-1;
if(ty<0)ty=0;if(ty>=my)ty=my-1;
moving=true;
};
document.addEventListener('keydown',function(e){
if(!pl)return;
if(e.key=='ArrowUp'){ty=Math.max(0,player.y-1);moving=true}
else if(e.key=='ArrowDown'){ty=Math.min(Math.floor(c.height/sz)-1,player.y+1);moving=true}
else if(e.key=='ArrowLeft'){tx=Math.max(0,player.x-1);moving=true}
else if(e.key=='ArrowRight'){tx=Math.min(Math.floor(c.width/sz)-1,player.x+1);moving=true}
});
document.getElementById('sb').onclick=st;
document.getElementById('rb').onclick=st;
</script>
</body>
</html>
