<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Light Chaser | Fang Lysset</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0a0a0f;
            color: white;
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Start Screen */
        #start-screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0f 100%);
            z-index: 100;
            padding: 20px;
            text-align: center;
        }

        .title {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff 0%, #d4af37 50%, #fff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 2s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        .subtitle {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.6);
            margin-bottom: 40px;
        }

        .start-btn {
            background: linear-gradient(135deg, #d4af37 0%, #b8962e 100%);
            color: #0a0a0f;
            border: none;
            padding: 20px 60px;
            font-size: 1.3rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 40px rgba(212, 175, 55, 0.3);
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 60px rgba(212, 175, 55, 0.5);
        }

        .instructions {
            margin-top: 40px;
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
            max-width: 300px;
        }

        /* Game Screen */
        #game-screen {
            position: fixed;
            inset: 0;
            display: none;
            cursor: crosshair;
        }

        #game-canvas {
            width: 100%;
            height: 100%;
        }

        /* HUD */
        .hud {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            z-index: 10;
            pointer-events: none;
        }

        .hud-item {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 30px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .hud-label {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hud-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #d4af37;
        }

        /* Combo Display */
        .combo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            font-weight: 700;
            color: #d4af37;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.8);
            pointer-events: none;
            opacity: 0;
            z-index: 20;
        }

        .combo.show {
            animation: comboPop 0.5s ease-out;
        }

        @keyframes comboPop {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        /* Game Over */
        #game-over {
            position: fixed;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(10, 10, 15, 0.95);
            z-index: 100;
            padding: 20px;
            text-align: center;
        }

        .game-over-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #d4af37;
        }

        .final-score {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .final-time {
            color: rgba(255,255,255,0.6);
            margin-bottom: 40px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 40px;
            max-width: 300px;
        }

        .stat-item {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 15px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #d4af37;
        }

        .stat-label {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
        }

        /* Particles */
        .particle {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 15;
        }

        /* Flash Effect */
        .flash {
            position: fixed;
            inset: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 5;
        }

        .flash.active {
            animation: flashAnim 0.1s ease-out;
        }

        @keyframes flashAnim {
            0% { opacity: 0.8; }
            100% { opacity: 0; }
        }

        /* Progress Bar */
        .progress-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            height: 6px;
            background: linear-gradient(90deg, #d4af37, #fff);
            width: 100%;
            z-index: 10;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Start Screen -->
    <div id="start-screen">
        <div class="title">💡 Light Chaser</div>
        <div class="subtitle">Fang lysene før de forsvinder!</div>
        <button class="start-btn" onclick="startGame()">SPIL NU</button>
        <div class="instructions">
            Tap på lysene for at fange dem!<br>
            Jo hurtigere du er, jo flere points.<br>
            Du har 5 minutter. God fornøjelse! 🎮
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen">
        <canvas id="game-canvas"></canvas>
        
        <div class="hud">
            <div class="hud-item">
                <div class="hud-label">Score</div>
                <div class="hud-value" id="score">0</div>
            </div>
            <div class="hud-item">
                <div class="hud-label">Tid</div>
                <div class="hud-value" id="timer">5:00</div>
            </div>
        </div>

        <div class="combo" id="combo"></div>
        <div class="flash" id="flash"></div>
        <div class="progress-bar" id="progress"></div>
    </div>

    <!-- Game Over -->
    <div id="game-over">
        <div class="game-over-title">Tiden er gået! 🎉</div>
        <div class="final-score" id="final-score">0</div>
        <div class="final-time" id="final-time">Spilletid: 5:00</div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="total-catches">0</div>
                <div class="stat-label">Fanget</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="max-combo">0</div>
                <div class="stat-label">Max Combo</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="accuracy">0%</div>
                <div class="stat-label">Præcision</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="missed">0</div>
                <div class="stat-label">Misset</div>
            </div>
        </div>

        <button class="start-btn" onclick="restartGame()">SPIL IGEN</button>
    </div>

    <script>
        // Game State
        let score = 0;
        let timeLeft = 300; // 5 minutes
        let isPlaying = false;
        let lights = [];
        let particles = [];
        let combo = 0;
        let maxCombo = 0;
        let totalCatches = 0;
        let totalMisses = 0;
        let clicks = 0;
        let gameLoop;
        let spawnTimer;
        
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');

        // Resize canvas
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Light class
        class Light {
            constructor() {
                this.x = Math.random() * (canvas.width - 100) + 50;
                this.y = Math.random() * (canvas.height - 200) + 100;
                this.radius = 30 + Math.random() * 20;
                this.hue = Math.random() * 60 + 30; // Gold/yellow range
                this.life = 1;
                this.maxLife = 2 + Math.random() * 2;
                this.speed = 0.5 + Math.random() * 0.5;
                this.vx = (Math.random() - 0.5) * this.speed;
                this.vy = (Math.random() - 0.5) * this.speed;
                this.pulsePhase = Math.random() * Math.PI * 2;
            }

            update(dt) {
                this.x += this.vx;
                this.y += this.vy;
                
                // Bounce off walls
                if (this.x < 50 || this.x > canvas.width - 50) this.vx *= -1;
                if (this.y < 100 || this.y > canvas.height - 50) this.vy *= -1;
                
                this.life -= dt;
                this.pulsePhase += dt * 5;
            }

            draw() {
                const pulse = Math.sin(this.pulsePhase) * 0.2 + 1;
                const r = this.radius * pulse * (this.life / this.maxLife);
                
                // Glow
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r * 3);
                gradient.addColorStop(0, `hsla(${this.hue}, 80%, 70%, ${this.life * 0.8})`);
                gradient.addColorStop(0.3, `hsla(${this.hue}, 80%, 50%, ${this.life * 0.4})`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, r * 3, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // Core
                ctx.beginPath();
                ctx.arc(this.x, this.y, r * 0.5, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 90%, ${this.life})`;
                ctx.fill();
            }

            contains(px, py) {
                const dx = px - this.x;
                const dy = py - this.y;
                return Math.sqrt(dx*dx + dy*dy) < this.radius * 1.5;
            }
        }

        // Particle class
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 15;
                this.vy = (Math.random() - 0.5) * 15;
                this.life = 1;
                this.color = color;
                this.size = 5 + Math.random() * 10;
            }

            update(dt) {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.95;
                this.vy *= 0.95;
                this.life -= dt * 2;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fillStyle = this.color.replace('1)', `${this.life})`);
                ctx.fill();
            }
        }

        // Start Game
        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            
            score = 0;
            timeLeft = 300;
            lights = [];
            particles = [];
            combo = 0;
            maxCombo = 0;
            totalCatches = 0;
            totalMisses = 0;
            clicks = 0;
            isPlaying = true;
            
            updateHUD();
            startSpawning();
            gameLoop = requestAnimationFrame(update);
        }

        // Restart Game
        function restartGame() {
            document.getElementById('game-over').style.display = 'none';
            startGame();
        }

        // Spawn Lights
        function startSpawning() {
            spawnLight();
            spawnTimer = setTimeout(() => {
                if (isPlaying) {
                    startSpawning();
                }
            }, 800 - Math.min(score / 100, 500));
        }

        function spawnLight() {
            if (lights.length < 8) {
                lights.push(new Light());
            }
        }

        // Update
        let lastTime = 0;
        function update(timestamp) {
            if (!isPlaying) return;
            
            const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
            lastTime = timestamp;
            
            // Clear
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw background glow
            const bgGradient = ctx.createRadialGradient(
                canvas.width/2, canvas.height/2, 0,
                canvas.width/2, canvas.height/2, canvas.width * 0.7
            );
            bgGradient.addColorStop(0, 'rgba(26, 26, 46, 0.5)');
            bgGradient.addColorStop(1, 'transparent');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Update and draw lights
            for (let i = lights.length - 1; i >= 0; i--) {
                lights[i].update(dt);
                lights[i].draw();
                
                if (lights[i].life <= 0) {
                    lights.splice(i, 1);
                    totalMisses++;
                }
            }
            
            // Update and draw particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update(dt);
                particles[i].draw();
                
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }
            
            // Update timer
            timeLeft -= dt;
            if (timeLeft <= 0) {
                endGame();
                return;
            }
            
            updateHUD();
            gameLoop = requestAnimationFrame(update);
        }

        // Update HUD
        function updateHUD() {
            document.getElementById('score').textContent = score;
            
            const mins = Math.floor(timeLeft / 60);
            const secs = Math.floor(timeLeft % 60);
            document.getElementById('timer').textContent = 
                `${mins}:${secs.toString().padStart(2, '0')}`;
            
            const progress = (timeLeft / 300) * 100;
            document.getElementById('progress').style.width = `${progress}%`;
        }

        // Handle clicks/taps
        canvas.addEventListener('click', handleInput);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleInput(e.touches[0]);
        });

        function handleInput(e) {
            if (!isPlaying) return;
            
            clicks++;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.pageX) - rect.left;
            const y = (e.clientY || e.pageY) - rect.top;
            
            let caught = false;
            
            for (let i = lights.length - 1; i >= 0; i--) {
                if (lights[i].contains(x, y)) {
                    // Caught!
                    caught = true;
                    combo++;
                    if (combo > maxCombo) maxCombo = combo;
                    
                    const points = 10 + (combo * 5);
                    score += points;
                    totalCatches++;
                    
                    // Spawn particles
                    for (let j = 0; j < 15; j++) {
                        particles.push(new Particle(
                            lights[i].x, lights[i].y,
                            `hsla(${lights[i].hue}, 80%, 60%, 1)`
                        ));
                    }
                    
                    // Show combo
                    if (combo > 1) {
                        const comboEl = document.getElementById('combo');
                        comboEl.textContent = `${combo}x COMBO!`;
                        comboEl.classList.remove('show');
                        void comboEl.offsetWidth;
                        comboEl.classList.add('show');
                    }
                    
                    // Flash
                    const flash = document.getElementById('flash');
                    flash.classList.remove('active');
                    void flash.offsetWidth;
                    flash.classList.add('active');
                    
                    lights.splice(i, 1);
                    break;
                }
            }
            
            if (!caught) {
                combo = 0;
            }
        }

        // End Game
        function endGame() {
            isPlaying = false;
            clearTimeout(spawnTimer);
            cancelAnimationFrame(gameLoop);
            
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('game-over').style.display = 'flex';
            
            document.getElementById('final-score').textContent = score;
            
            const mins = Math.floor((300 - timeLeft) / 60);
            const secs = Math.floor((300 - timeLeft) % 60);
            document.getElementById('final-time').textContent = 
                `Spilletid: ${mins}:${secs.toString().padStart(2, '0')}`;
            
            document.getElementById('total-catches').textContent = totalCatches;
            document.getElementById('max-combo').textContent = maxCombo;
            
            const accuracy = clicks > 0 ? Math.round((totalCatches / clicks) * 100) : 0;
            document.getElementById('accuracy').textContent = accuracy + '%';
            document.getElementById('missed').textContent = totalMisses;
        }
    </script>
</body>
</html>
