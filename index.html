<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Light Chaser</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:#000;color:#fff;overflow:hidden;height:100vh;height:100dvh;touch-action:none;user-select:none}
.s{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:#000}
.s.active{display:flex}
#start{background:#000}
h1{font-size:clamp(2.5rem,10vw,4rem);font-weight:900;color:#00ff88;text-shadow:0 0 40px #00ff88;margin-bottom:10px}
.sub{color:#888;margin-bottom:30px;font-size:1rem}
.btn{background:#00ff88;color:#000;border:none;padding:20px 60px;font-size:1.3rem;font-weight:700;border-radius:50px;text-transform:uppercase}
.high{position:absolute;top:20px;right:20px;background:#1a1a2e;padding:12px 20px;border-radius:15px;font-size:0.9rem}
.high span{color:#00ff88;font-weight:700}
#gc{width:100%;height:100%;background:#050505;display:block}
.h{position:fixed;top:12px;left:12px;right:12px;display:flex;justify-content:space-between;pointer-events:none;z-index:10}
.b{background:#1a1a2e;padding:10px 20px;border-radius:18px}
.l{font-size:0.55rem;color:#666;text-transform:uppercase}
.v{font-size:1.4rem;font-weight:900;color:#00ff88}
.pb{position:fixed;bottom:0;left:0;height:5px;background:#00ff88;width:100%}
#over{background:#000}
.tk{font-size:2.5rem;color:#00ff88;margin-bottom:10px}
.fs{font-size:3rem;font-weight:900;color:#fff}
.fl{color:#666;margin-bottom:25px}
.st{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:100%;max-width:220px;margin-bottom:25px}
.sc{background:#1a1a2e;padding:12px;border-radius:12px;text-align:center}
.sv{font-size:1.2rem;font-weight:700;color:#00ff88}
.sl{font-size:0.55rem;color:#666;text-transform:uppercase;margin-top:4px}
.nh{color:#ff4444;font-weight:700;margin-bottom:15px;display:none}
.tut{position:absolute;bottom:50px;color:#555;font-size:0.85rem}
</style>
</head>
<body>
<div id="start" class="s active">
<div class="high">HIGH SCORE: <span id="hscore">0</span></div>
<h1>LIGHT<br>CHASER</h1>
<div class="sub">30 SEKUNDER</div>
<button class="btn" id="sb">START</button>
<div class="tut">Swipe for at flytte</div>
</div>
<div id="game" class="s">
<canvas id="gc"></canvas>
<div class="h">
<div class="b"><div class="l">SCORE</div><div class="v" id="sc">0</div></div>
<div class="b"><div class="l">TID</div><div class="v" id="tm">30</div></div>
</div>
<div class="pb" id="pb"></div>
</div>
<div id="over" class="s">
<div class="tk">SLUT!</div>
<div class="nh" id="nhs">NY HIGH!</div>
<div class="fs" id="fs">0</div>
<div class="fl">POINT</div>
<div class="st">
<div class="sc"><div class="sv" id="len">0</div><div class="sl">Lys fanget</div></div>
</div>
<button class="btn" id="rb">PRØV IGEN</button>
</div>
<script>
var hs=localStorage.getItem('lightHS')||'0';
document.getElementById('hscore').innerText=hs;
var c=document.getElementById('gc');
var x=c.getContext('2d');
var sz=40;
function rz(){
c.width=window.innerWidth;
c.height=window.innerHeight;
sz=Math.floor(Math.min(c.width,c.height)/9);
if(sz<30)sz=30;
if(sz>60)sz=60;
}
window.onresize=rz;
rz();
var sc=0,tm=30,pl=false;
var lights=[];
var my={x:0,y:0},nde={x:0,y:0};
var gid,lastTime;
function st(){
sc=0;tm=30;pl=true;lights=[];
var cx=Math.floor(c.width/sz/2);
var cy=Math.floor(c.height/sz/2);
my={x:cx,y:cy};
nde={x:0,y:0};
for(var i=0;i<3;i++)spawnLight();
document.getElementById('start').classList.remove('active');
document.getElementById('over').classList.remove('active');
document.getElementById('game').classList.add('active');
lastTime=Date.now();
lp();
}
function spawnLight(){
var mx=Math.floor(c.width/sz);
var my2=Math.floor(c.height/sz);
var lx,ly,ok;
for(var t=0;t<50;t++){
lx=Math.floor(Math.random()*(mx-2))+1;
ly=Math.floor(Math.random()*(my2-4))+2;
ok=true;
if(Math.abs(lx-my.x)<2&&Math.abs(ly-my.y)<2)ok=false;
for(var l of lights){if(l.x==lx&&l.y==ly)ok=false;}
if(ok)break;
}
if(ok)lights.push({x:lx,y:ly});
}
function lp(){
if(!pl)return;
var now=Date.now();
var dt=now-lastTime;
lastTime=now;
x.fillStyle='#050505';
x.fillRect(0,0,c.width,c.height);
//Grid
x.strokeStyle='#111';
for(var i=0;i<c.width;i+=sz){x.beginPath();x.moveTo(i,0);x.lineTo(i,c.height);x.stroke()}
for(var i=0;i<c.height;i+=sz){x.beginPath();x.moveTo(0,i);x.lineTo(c.width,i);x.stroke()}
//Move
if(nde.x!==0||nde.y!==0){
my.x+=nde.x;
my.y+=nde.y;
var mx=Math.floor(c.width/sz);
var my2=Math.floor(c.height/sz);
if(my.x<0)my.x=mx-1;
if(my.x>=mx)my.x=0;
if(my.y<0)my.y=my2-1;
if(my.y>=my2)my.y=0;
}
//Draw MY - GRØN
x.fillStyle='#00ff88';
x.beginPath();
x.roundRect(my.x*sz+3,my.y*sz+3,sz-6,sz-6,8);
x.fill();
//Draw Lights - LILLA/PINK
x.fillStyle='#ff00ff';
for(var l of lights){
x.beginPath();
x.arc(l.x*sz+sz/2,l.y*sz+sz/2,sz*0.4,0,6.28);
x.fill();
x.shadowColor='#ff00ff';
x.shadowBlur=25;
x.fill();
}
x.shadowBlur=0;
//Catch
for(var i=lights.length-1;i>=0;i--){
if(lights[i].x==my.x&&lights[i].y==my.y){
sc+=10;
lights.splice(i,1);
spawnLight();
}
}
tm-=dt/1000;
if(tm<=0){nd();return;}
document.getElementById('sc').innerText=sc;
document.getElementById('tm').innerText=Math.ceil(tm);
document.getElementById('pb').style.width=(tm/30*100)+'%';
gid=setTimeout(lp,100);
}
function nd(){
pl=false;clearTimeout(gid);
var h=parseInt(localStorage.getItem('lightHS')||'0');
var nh=sc>h;if(nh)localStorage.setItem('lightHS',sc);
document.getElementById('game').classList.remove('active');
document.getElementById('over').classList.add('active');
document.getElementById('fs').innerText=sc;
document.getElementById('nhs').style.display=nh?'block':'none';
document.getElementById('len').innerText=Math.floor(sc/10);
}
var sx,sy;
document.getElementById('gc').ontouchstart=function(e){
sx=e.touches[0].clientX;
sy=e.touches[0].clientY;
};
document.getElementById('gc').ontouchend=function(e){
if(!pl)return;
var ex=e.changedTouches[0].clientX,ey=e.changedTouches[0].clientY;
var dx=ex-sx,dy=ey-sy;
if(Math.abs(dx)>Math.abs(dy)){
if(dx>25&&nde.x!==-1)nde={x:1,y:0}
else if(dx<-25&&nde.x!==1)nde={x:-1,y:0}
}else{
if(dy>25&&nde.y!==-1)nde={x:0,y:1}
else if(dy<-25&&nde.y!==1)nde={x:0,y:-1}
}
};
document.addEventListener('keydown',function(e){
if(!pl)return;
if(e.key=='ArrowUp'&&nde.y!==1)nde={x:0,y:-1}
else if(e.key=='ArrowDown'&&nde.y!==-1)nde={x:0,y:1}
else if(e.key=='ArrowLeft'&&nde.x!==1)nde={x:-1,y:0}
else if(e.key=='ArrowRight'&&nde.x!==-1)nde={x:1,y:0}
});
document.getElementById('sb').onclick=st;
document.getElementById('rb').onclick=st;
</script>
</body>
</html>
