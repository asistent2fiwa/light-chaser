<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Light Chaser</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:#000;color:#fff;overflow:hidden;height:100vh;height:100dvh;touch-action:none;user-select:none}
.s{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:#000}
.s.active{display:flex}
#start{background:linear-gradient(#0f172a,#000)}
h1{font-size:clamp(2rem,8vw,3rem);font-weight:900;color:#fbbf24;text-shadow:0 0 30px #fbbf24;margin-bottom:8px}
.sub{color:#64748b;margin-bottom:25px;font-size:0.9rem}
.btn{background:#fbbf24;color:#000;border:none;padding:15px 50px;font-size:1rem;font-weight:700;border-radius:50px;cursor:pointer;text-transform:uppercase}
.high{position:absolute;top:15px;right:15px;background:#1e293b;padding:8px 15px;border-radius:12px;font-size:0.8rem}
.high span{color:#fbbf24;font-weight:700}
#gc{width:100%;height:100%;background:#080808;display:block}
.h{position:fixed;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;pointer-events:none;z-index:10}
.b{background:#1e293b;padding:8px 18px;border-radius:15px}
.l{font-size:0.5rem;color:#64748b;text-transform:uppercase}
.v{font-size:1.2rem;font-weight:900;color:#fbbf24}
.pb{position:fixed;bottom:0;left:0;height:4px;background:#fbbf24;width:100%}
#over{background:#000}
.tk{font-size:2rem;margin-bottom:8px}
.fs{font-size:2.5rem;font-weight:900;color:#fbbf24}
.fl{color:#64748b;margin-bottom:20px}
.st{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;width:100%;max-width:200px;margin-bottom:20px}
.sc{background:#1e293b;padding:10px;border-radius:10px;text-align:center}
.sv{font-size:1rem;font-weight:700;color:#fbbf24}
.sl{font-size:0.5rem;color:#64748b;text-transform:uppercase;margin-top:3px}
.nh{color:#f87171;font-weight:700;margin-bottom:12px;display:none}
.tut{position:absolute;bottom:40px;text-align:center;color:#64748b;font-size:0.8rem}
</style>
</head>
<body>
<div id="start" class="s active">
<div class="high">HIGH: <span id="hscore">0</span></div>
<h1>LIGHT CHASER</h1>
<div class="sub">FANG LYSENE - BLIV STØRRE</div>
<button class="btn" id="sb">SPIL</button>
<div class="tut">Swipe op/ned/venstre/højre</div>
</div>
<div id="game" class="s">
<canvas id="gc"></canvas>
<div class="h">
<div class="b"><div class="l">SCORE</div><div class="v" id="sc">0</div></div>
<div class="b"><div class="l">TID</div><div class="v" id="tm">30</div></div>
</div>
<div class="pb" id="pb"></div>
</div>
<div id="over" class="s">
<div class="tk">GAME OVER</div>
<div class="nh" id="nhs">NY HIGH!</div>
<div class="fs" id="fs">0</div>
<div class="fl">POINT</div>
<div class="st">
<div class="sc"><div class="sv" id="len">0</div><div class="sl">Fanget</div></div>
</div>
<button class="btn" id="rb">SPIL IGEN</button>
</div>
<script>
var hs=localStorage.getItem('lightHS')||'0';
document.getElementById('hscore').innerText=hs;
var c=document.getElementById('gc');
var x=c.getContext('2d');
var sz=35;
function rz(){
c.width=window.innerWidth;
c.height=window.innerHeight;
sz=Math.floor(Math.min(c.width,c.height)/10);
if(sz<25)sz=25;
if(sz>50)sz=50;
}
window.onresize=rz;
rz();
var sc=0,tm=30,pl=false;
var lights=[];
var my={x:0,y:0},dir={x:0,y:0},nde={x:0,y:0};
var gid,lastTime;
function st(){
sc=0;tm=30;pl=true;lights=[];
var cx=Math.floor(c.width/sz/2);
var cy=Math.floor(c.height/sz/2);
my={x:cx,y:cy};
dir={x:0,y:0};nde={x:0,y:0};
for(var i=0;i<3;i++)spawnLight();
document.getElementById('start').classList.remove('active');
document.getElementById('over').classList.remove('active');
document.getElementById('game').classList.add('active');
lastTime=Date.now();
lp();
}
function spawnLight(){
var mx=Math.floor(c.width/sz);
var my2=Math.floor(c.height/sz);
var lx,ly,ok;
for(var t=0;t<50;t++){
lx=Math.floor(Math.random()*(mx-2))+1;
ly=Math.floor(Math.random()*(my2-4))+2;
ok=true;
if(Math.abs(lx-my.x)<2&&Math.abs(ly-my.y)<2)ok=false;
for(var l of lights){if(l.x==lx&&l.y==ly)ok=false;}
if(ok)break;
}
if(ok)lights.push({x:lx,y:ly});
}
function lp(){
if(!pl)return;
var now=Date.now();
var dt=now-lastTime;
lastTime=now;
x.fillStyle='#000';
x.fillRect(0,0,c.width,c.height);
//Grid
x.strokeStyle='#111';
for(var i=0;i<c.width;i+=sz){x.beginPath();x.moveTo(i,0);x.lineTo(i,c.height);x.stroke()}
for(var i=0;i<c.height;i+=sz){x.beginPath();x.moveTo(0,i);x.lineTo(c.width,i);x.stroke()}
//Move
if(nde.x!=0||nde.y!=0){
my.x+=nde.x;
my.y+=nde.y;
var mx=Math.floor(c.width/sz);
var my2=Math.floor(c.height/sz);
if(my.x<0)my.x=mx-1;
if(my.x>=mx)my.x=0;
if(my.y<0)my.y=my2-1;
if(my.y>=my2)my.y=0;
}
//Draw MY
x.fillStyle='#fbbf24';
x.beginPath();
x.roundRect(my.x*sz+2,my.y*sz+2,sz-4,sz-4,6);
x.fill();
x.shadowColor='#fbbf24';
x.shadowBlur=15;
x.fill();
x.shadowBlur=0;
//Lights
x.fillStyle='#3b82f6';
for(var l of lights){
x.beginPath();
x.arc(l.x*sz+sz/2,l.y*sz+sz/2,sz*0.35,0,7);
x.fill();
x.shadowColor='#3b82f6';
x.shadowBlur=20;
x.fill();
}
x.shadowBlur=0;
//Catch
for(var i=lights.length-1;i>=0;i--){
var l=lights[i];
if(l.x==my.x&&l.y==my.y){
sc+=10;
lights.splice(i,1);
spawnLight();
}
}
tm-=dt/1000;
if(tm<=0){nd();return;}
document.getElementById('sc').innerText=sc;
document.getElementById('tm').innerText=Math.ceil(tm);
document.getElementById('pb').style.width=(tm/30*100)+'%';
gid=setTimeout(lp,150);
}
function nd(){
pl=false;clearTimeout(gid);
var h=parseInt(localStorage.getItem('lightHS')||'0');
var nh=sc>h;if(nh)localStorage.setItem('lightHS',sc);
document.getElementById('game').classList.remove('active');
document.getElementById('over').classList.add('active');
document.getElementById('fs').innerText=sc;
document.getElementById('nhs').style.display=nh?'block':'none';
document.getElementById('len').innerText=Math.floor(sc/10);
}
var sx,sy;
document.getElementById('gc').ontouchstart=function(e){sx=e.touches[0].clientX;sy=e.touches[0].clientY};
document.getElementById('gc').ontouchend=function(e){
if(!pl)return;
var ex=e.changedTouches[0].clientX,ey=e.changedTouches[0].clientY;
var dx=ex-sx,dy=ey-sy;
if(Math.abs(dx)>Math.abs(dy)){
if(dx>20&&nde.x!=-1)nde={x:1,y:0}
else if(dx<-20&&nde.x!=1)nde={x:-1,y:0}
}else{
if(dy>20&&nde.y!=-1)nde={x:0,y:1}
else if(dy<-20&&nde.y!=1)nde={x:0,y:-1}
}
};
document.addEventListener('keydown',function(e){
if(!pl)return;
if(e.key=='ArrowUp'&&nde.y!=1)nde={x:0,y:-1}
else if(e.key=='ArrowDown'&&nde.y!=-1)nde={x:0,y:1}
else if(e.key=='ArrowLeft'&&nde.x!=1)nde={x:-1,y:0}
else if(e.key=='ArrowRight'&&nde.x!=-1)nde={x:1,y:0}
});
document.getElementById('sb').onclick=st;
document.getElementById('rb').onclick=st;
</script>
</body>
</html>
